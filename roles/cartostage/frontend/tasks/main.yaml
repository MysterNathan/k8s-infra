# ansible/roles/frontend-deploy/tasks/main.yaml
---
- name: Create frontend workspace
  file:
    path: "{{ workspace_path }}/frontend"
    state: directory
    mode: '0755'
  tags: ['setup']

- name: Create k8s subdirectory
  file:
    path: "{{ workspace_path }}/frontend/k8s"
    state: directory
    mode: '0755'
  tags: ['setup']

- name: Check if kubectl is installed
  command: kubectl version --client
  register: kubectl_check
  failed_when: false
  changed_when: false
  tags: ['check']

- name: Fail if kubectl is not installed
  fail:
    msg: "kubectl is not installed or not accessible"
  when: kubectl_check.rc != 0
  tags: ['check']

- name: Check Kubernetes cluster connectivity
  command: kubectl cluster-info
  register: k8s_check
  failed_when: false
  changed_when: false
  tags: ['check']

- name: Fail if Kubernetes cluster is not reachable
  fail:
    msg: "Unable to connect to the Kubernetes cluster"
  when: k8s_check.rc != 0
  tags: ['check']

- name: Copy Kubernetes deployment manifest
  copy:
    src: "deployment.yaml"
    dest: "{{ workspace_path }}/frontend/k8s/deployment.yaml"
    mode: '0644'
  register: k8s_manifest
  tags: ['deploy']

- name: Apply Kubernetes manifests
  command: kubectl apply -f {{ workspace_path }}/frontend/k8s/deployment.yaml
  register: k8s_deploy
  changed_when: "'configured' in k8s_deploy.stdout or 'created' in k8s_deploy.stdout"
  tags: ['deploy']

- name: Wait for deployment to be available
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: frontend-app
    namespace: csfront
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300
  tags: ['deploy']

- name: Get pods status
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: csfront
    label_selectors:
      - app=frontend
  register: frontend_pods
  tags: ['status']

- name: Display pods status
  debug:
    msg: |
      Deployed frontend pods:
      {% for pod in frontend_pods.resources %}
      - {{ pod.metadata.name }}: {{ pod.status.phase }}
      {% endfor %}
  tags: ['status']
