# auth-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: csback
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
        - name: registry-credentials
      containers:
      - name: auth-service
        image: mysternathan.freeboxos.fr/auth-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        envFrom:
          - configMapRef:
              name: backend-config
          - secretRef:
              name: backend-secret
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cartostage.postgres-cartostage.credentials.postgresql.acid.zalan.do
              key: password
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: csback
spec:
  selector:
    app: auth-service
  ports:
  - name: http
    port: 80
    targetPort: 80
  type: ClusterIP
---
