# containerd-registry-config-daemonset.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: containerd-registry-config
  namespace: kube-system
data:
  config.toml: |
    version = 2
    
    [plugins]
      [plugins."io.containerd.grpc.v1.cri"]
        sandbox_image = "registry.k8s.io/pause:3.6"
        
        [plugins."io.containerd.grpc.v1.cri".registry]
          [plugins."io.containerd.grpc.v1.cri".registry.mirrors]
            [plugins."io.containerd.grpc.v1.cri".registry.mirrors."192.168.1.193:31498"]
              endpoint = ["http://192.168.1.193:31498"]
          
          [plugins."io.containerd.grpc.v1.cri".registry.configs]
            [plugins."io.containerd.grpc.v1.cri".registry.configs."192.168.1.193:31498".tls]
              insecure_skip_verify = true
            [plugins."io.containerd.grpc.v1.cri".registry.configs."192.168.1.193:31498".transport]
              allow_plain_http = true
        
        [plugins."io.containerd.grpc.v1.cri".containerd]
          [plugins."io.containerd.grpc.v1.cri".containerd.runtimes]
            [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
              runtime_type = "io.containerd.runc.v2"
              [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
                SystemdCgroup = true
        
        [plugins."io.containerd.grpc.v1.cri".cni]
          bin_dir = "/opt/cni/bin"
          conf_dir = "/etc/cni/net.d"

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: containerd-config-updater
  namespace: kube-system
  labels:
    k8s-app: containerd-config-updater
spec:
  selector:
    matchLabels:
      name: containerd-config-updater
  template:
    metadata:
      labels:
        name: containerd-config-updater
    spec:
      hostNetwork: true
      hostPID: true
      tolerations:
      - operator: Exists
        effect: NoSchedule
      containers:
      - name: config-updater
        image: alpine:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "Démarrage de la configuration containerd..."
          
          # Backup de la config existante
          if [ -f /host-containerd/config.toml ]; then
            cp /host-containerd/config.toml /host-containerd/config.toml.backup.$(date +%s)
            echo "Sauvegarde créée"
          fi
          
          # Copie de la nouvelle config
          cp /config/config.toml /host-containerd/config.toml
          echo "Nouvelle configuration copiée"
          
          # Redémarrage de containerd et kubelet
          echo "Redémarrage de containerd..."
          nsenter -t 1 -m -u -i -n -p -- systemctl restart containerd
          
          echo "Attente de 10 secondes..."
          sleep 10
          
          echo "Redémarrage de kubelet..."
          nsenter -t 1 -m -u -i -n -p -- systemctl restart kubelet
          
          echo "Configuration terminée, surveillance..."
          
          # Surveiller les changements
          while true; do
            if ! cmp -s /config/config.toml /host-containerd/config.toml; then
              echo "Changement de configuration détecté, mise à jour..."
              cp /config/config.toml /host-containerd/config.toml
              nsenter -t 1 -m -u -i -n -p -- systemctl restart containerd
              sleep 10
              nsenter -t 1 -m -u -i -n -p -- systemctl restart kubelet
            fi
            sleep 30
          done
        volumeMounts:
        - name: config
          mountPath: /config
        - name: host-containerd
          mountPath: /host-containerd
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: config
        configMap:
          name: containerd-registry-config
      - name: host-containerd
        hostPath:
          path: /etc/containerd
          type: DirectoryOrCreate
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
