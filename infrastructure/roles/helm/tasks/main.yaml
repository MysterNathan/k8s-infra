---
- name: Install base dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - gnupg
      - software-properties-common
    state: present
    update_cache: yes

- name: Install Kubernetes Python packages via APT
  apt:
    name:
      - python3-kubernetes
      - python3-pip
    state: present
    update_cache: yes


- name: Install Helm via official script 
  block:
    - name: Download Helm install script
      get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get_helm3
        mode: '0755'

    - name: Install Helm
      command: /tmp/get_helm3
      args:
        creates: /usr/local/bin/helm
