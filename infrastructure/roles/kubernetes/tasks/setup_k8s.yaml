---
- name: Check if Kubernetes is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_initialized

- name: Initialize the Kubernetes cluster
  command: sudo kubeadm init --pod-network-cidr=10.244.0.0/16
  args:
    creates: /etc/kubernetes/admin.conf
  when: not kubeadm_initialized.stat.exists

- name: Ensure .kube directory exists for users
  file:
    path: "{{ item }}/.kube"
    state: directory
    owner: "{{ item | basename }}"
    group: "{{ item | basename }}"
    mode: '0755'
  loop:
    - /root
    - /home/nathan

- name: Copy kubeconfig for users
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "{{ item }}/.kube/config"
    remote_src: yes
    owner: "{{ item | basename }}"
    group: "{{ item | basename }}"
    mode: '0600'
  loop:
    - /root
    - /home/nathan

- name: Ensure kubeadm directory exists
  file:
    path: /home/nathan/kubernets/files/
    state: directory
    mode: '0755'

- name: Get kubeadm join command
  shell: sudo kubeadm token create --print-join-command
  register: kubeadm_join_command
  changed_when: false
  failed_when: kubeadm_join_command.rc != 0 and "connection refused" not in kubeadm_join_command.stderr

- name: Save join command for workers
  copy:
    content: "{{ kubeadm_join_command.stdout }}"
    dest: /home/nathan/kubernets/files/kubeadm_join.sh
    mode: '0644'
  when: kubeadm_join_command.rc == 0

- name: Install Flannel CNI plugin
  command: kubectl apply -f https://raw.githubusercontent.com/coreos/flannel/master/Documentation/kube-flannel.yml
  environment:
    KUBECONFIG: /home/nathan/.kube/config
  register: flannel_installation
  changed_when: "'created' in flannel_installation.stdout or 'configured' in flannel_installation.stdout"