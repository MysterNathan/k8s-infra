kind: "postgresql"
apiVersion: "acid.zalan.do/v1"
metadata:
  name: "postgres-cartostage"
  namespace: "csback"
  labels:
    team: acid
spec:
  teamId: "acid"
  postgresql:
    version: "16"
    parameters:
      ssl: "on"
      ssl_min_protocol_version: "TLSv1.2"
  numberOfInstances: 3
  volume:
    size: "10Gi"
  users:
    postgres : []
    cartostage: []
  databases:
    cartostage: cartostage
  allowedSourceRanges:
    - 10.0.0.0/8
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
