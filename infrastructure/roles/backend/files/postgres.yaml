kind: "postgresql"
apiVersion: "acid.zalan.do/v1"
metadata:
  name: "postgres"
  namespace: "backend"
  labels:
    team: acid
spec:
  teamId: "acid"
  postgresql:
    version: "17"
    parameters:
      ssl: "off"
  patroni:
    pg_hba:
      - "local all all trust"
      - "host all all 0.0.0.0/0 md5"
      - "host replication all 0.0.0.0/0 md5"
  numberOfInstances: 3
  volume:
    size: "10Gi"
  users:
    postgres: []
    vitrine:
      - superuser
      - createdb
  databases:
    portfolio_db: postgres
  allowedSourceRanges:
    - 0.0.0.0/0
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
    limits:
      cpu: 500m
      memory: 500Mi