
- name: Create github-runners namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ github_runner_namespace }}"

- name: Create ServiceAccount for github runner
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: github-runner-sa
        namespace: "{{ github_runner_namespace }}"

- name: Create ClusterRoleBinding for github runner
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: github-runner-rb
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: cluster-admin
      subjects:
        - kind: ServiceAccount
          name: github-runner-sa
          namespace: "{{ github_runner_namespace }}"

- name: Deploy RunnerDeployment
  kubernetes.core.k8s:
    state: present
    template: "runner.yaml.j2"