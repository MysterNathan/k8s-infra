---
- name: Reset Kubernetes Cluster
  hosts: all
  become: true
  tasks:

    - name: Drain node (optional - master only)
      shell: |
        kubectl drain {{ inventory_hostname }} --ignore-daemonsets --delete-local-data
      when: inventory_hostname in groups['masters']
      ignore_errors: yes

    - name: Reset kubeadm
      shell: kubeadm reset -f
      ignore_errors: yes

    - name: Remove Kubernetes-related directories
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/cni/net.d
        - /var/lib/etcd
        - /var/etcd
        - /var/lib/kubelet
        - /etc/kubernetes
        - ~/.kube
        - /var/lib/cni
        - /opt/cni
        - /etc/systemd/system/kubelet.service.d

    - name: Remove CNI bridge interfaces (like cni0, flannel.1)
      shell: |
        ip link delete cni0 || true
        ip link delete flannel.1 || true
        ip link delete docker0 || true
      ignore_errors: yes

    - name: Restart container runtime (containerd or Docker)
      service:
        name: "{{ item }}"
        state: restarted
        enabled: true
      loop:
        - containerd
        - docker
      ignore_errors: yes

    - name: Reload systemd
      shell: systemctl daemon-reexec

    - name: Flush iptables
      shell: iptables -F && iptables -t nat -F && iptables -t mangle -F && iptables -X
      ignore_errors: yes
