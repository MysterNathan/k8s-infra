---
- name: Setup Kubernetes
  hosts: all
  become: yes
  roles:
    - role: '../roles/kubernetes'

- name: Setup Kubernetes Workers
  hosts: workers
  become: yes
  roles:
    - role: '../roles/join_kubernetes'
  tag: "workers"

- name: Setup Kubernetes cluster
  hosts: masters
  become: yes
  roles: 
    - role: '../roles/helm'
    - role: '../roles/metallb'
    - role: '../roles/traefik'

